<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اجب عن الأسئلة - ماذا يرى الناس فيك؟</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header>
        <h1>ساعد <span id="target-name" style="color:var(--accent);">...</span> في فهم نفسه</h1>
        <p>اجب بصدق وصراحة. إجاباتك تساعد في تطوير شخصيته.</p>
    </header>

    <div id="loading-block">
        <div class="loader"></div>
        <p class="text-center">جاري تحميل الأسئلة...</p>
    </div>

    <div id="survey-block" class="card hidden">
        <form id="survey-form">
            <div id="questions-container">
                </div>
            
            <div class="form-group mt-20" style="border-top: 2px solid #eee; padding-top: 15px;">
                <label>اسمك (اختياري، اتركه فارغاً لتبقى مجهولاً) 🤫</label>
                <input type="text" id="friend-name" placeholder="اسمك المستعار أو الحقيقي">
            </div>

            <button type="submit" class="btn btn-primary mt-20">إرسال الإجابات بصراحة ✅</button>
        </form>
    </div>

    <div id="thanks-block" class="card text-center hidden">
        <h2 style="color: #2ecc71;">شكراً لك! ❤️</h2>
        <p>تم إرسال إجاباتك الصريحة بنجاح. لقد ساعدت صديقك اليوم.</p>
        <p class="mt-20">لماذا لا تجرب الاختبار أنت أيضاً؟</p>
        <a href="index.html" class="btn btn-success mt-10">إنشاء حساب خاص بي 🚀</a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Firebase Config
    const firebaseConfig = { apiKey: "AIzaSyBhdK4tSzTUU_n1UV7b8hPJF1ZK9cmNR4s", authDomain: "liev-69588.firebaseapp.com", projectId: "liev-69588", storageBucket: "liev-69588.firebasestorage.app", messagingSenderId: "619867900437", appId: "1:619867900437:web:2ab4f6ad25b38b166c9c1c" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // الحصول على الـ UserId من الرابط
    const urlParams = new URLSearchParams(window.location.search);
    let targetUserId = urlParams.get('id');

    // التعامل مع Rewrite Vercel لـ /r/id
    if(!targetUserId && window.location.pathname.startsWith('/r/')) {
        targetUserId = window.location.pathname.split('/r/')[1];
    }

    if (!targetUserId) {
        alert('رابط غير صحيح.');
        window.location.href = 'index.html';
    }

    let activeQuestions = [];

    async function loadSurvey() {
        try {
            const docRef = doc(db, "users", targetUserId);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById('target-name').innerText = data.name;
                
                const bank = data.questionBank || [];
                const selected = data.selectedQuestions || [];
                
                activeQuestions = bank.filter(q => selected.includes(q.id));
                
                if(activeQuestions.length === 0) {
                    document.getElementById('questions-container').innerHTML = '<p class="text-center">صاحب الحساب لم يحدد أسئلة نشطة بعد.</p>';
                } else {
                    renderQuestions();
                }

                document.getElementById('loading-block').classList.add('hidden');
                document.getElementById('survey-block').classList.remove('hidden');
            } else {
                alert('المستخدم غير موجود.');
                window.location.href = 'index.html';
            }
        } catch (e) {
            console.error(e);
            alert('حدث خطأ في تحميل البيانات.');
        }
    }

    function renderQuestions() {
        const container = document.getElementById('questions-container');
        container.innerHTML = '';

        activeQuestions.forEach((q, index) => {
            const qDiv = document.createElement('div');
            qDiv.className = 'survey-q form-group';
            
            const label = document.createElement('label');
            label.innerText = `${index + 1}. ${q.text}`;
            qDiv.appendChild(label);

            if (q.type === 'text') {
                const textarea = document.createElement('textarea');
                textarea.name = `q_${q.id}`;
                textarea.required = (q.id === 10); // مثال: جعل سؤال الرسالة السرية إجباري
                textarea.placeholder = 'اكتب إجابتك الصريحة هنا...';
                qDiv.appendChild(textarea);
            } else if (q.type === 'mcq') {
                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'mcq-options';
                
                // إضافة input مخفي لحفظ القيمة المختارة
                const hiddenInput = document.createElement('input');
                hiddenInput.type = 'hidden';
                hiddenInput.name = `q_${q.id}`;
                hiddenInput.id = `hidden_q_${q.id}`;
                hiddenInput.required = true; // الخيارات دائماً إجبارية
                qDiv.appendChild(hiddenInput);

                q.options.forEach(opt => {
                    const optBtn = document.createElement('div');
                    optBtn.className = 'mcq-option';
                    optBtn.innerText = opt;
                    optBtn.onclick = () => selectMcq(q.id, opt, optBtn);
                    optionsDiv.appendChild(optBtn);
                });
                qDiv.appendChild(optionsDiv);
            }
            container.appendChild(qDiv);
        });
    }

    // منطق اختيار MCQ
    function selectMcq(qId, value, element) {
        // إزالة التحديد من الباقي في نفس السؤال
        const parent = element.parentElement;
        parent.querySelectorAll('.mcq-option').forEach(el => el.classList.remove('selected'));
        
        // إضافة تحديد للعنصر الحالي
        element.classList.add('selected');
        
        // وضع القيمة في الـ input المخفي
        document.getElementById(`hidden_q_${qId}`).value = value;
    }

    // إرسال النوذج
    document.getElementById('survey-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const submitBtn = e.target.querySelector('button[type="submit"]');
        submitBtn.disabled = true;
        submitBtn.innerText = 'جاري الإرسال...';

        const formData = new FormData(e.target);
        const answers = {};
        let anonMessage = "";

        activeQuestions.forEach(q => {
            const val = formData.get(`q_${q.id}`);
            answers[q.id] = {
                qText: q.text,
                qType: q.type,
                answer: val
            };
            // تخزين الرسائل النصية المجهولة في حقل منفصل للسهولة (اختياري)
            if(q.type === 'text' && val) {
                anonMessage += `[${q.text}]: ${val}\n`;
            }
        });

        const friendName = document.getElementById('friend-name').value.trim() || "مجهول";

        try {
            // حفظ الإجابات في مجموعة responses
            await addDoc(collection(db, "responses"), {
                userId: targetUserId,
                friendName: friendName,
                answers: answers,
                timestamp: serverTimestamp()
            });

            // إذا كان هناك رسائل نصية، حفظها في مجموعة messages للعرض المباشر (اختياري حسب التصميم)
            if(anonMessage) {
                 await addDoc(collection(db, "messages"), {
                    userId: targetUserId,
                    friendName: friendName,
                    fullMessage: anonMessage,
                    timestamp: serverTimestamp()
                });
            }

            document.getElementById('survey-block').classList.add('hidden');
            document.getElementById('thanks-block').classList.remove('hidden');
            window.scrollTo(0, 0);
        } catch (e) {
            console.error(e);
            alert('حدث خطأ أثناء إرسال الإجابات.');
            submitBtn.disabled = false;
            submitBtn.innerText = 'إرسال الإجابات بصراحة ✅';
        }
    });

    window.onload = loadSurvey;
</script>
</body>
</html>
